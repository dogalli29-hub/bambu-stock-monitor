name: 🎯 Bambu Lab Stock Monitor

on:
  schedule:
    # Toutes les 15 minutes (GitHub Actions minimum = 5 min)
    - cron: "*/15 * * * *"
  workflow_dispatch:  # Permet de lancer manuellement depuis GitHub

jobs:
  check-stock:
    runs-on: ubuntu-latest
    # Donne les droits pour commit le fichier state.json
    permissions:
      contents: write

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4
        with:
          # Nécessaire pour pouvoir commit l'état
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
- name: Test Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=Test+GitHub+Actions"
      - name: 🔍 Vérifier le stock
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: 💾 Sauvegarder l'état (state.json)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          # Ne commit que si state.json a changé
          git diff --staged --quiet || git commit -m "🔄 Mise à jour état stock [skip ci]"
          git push
